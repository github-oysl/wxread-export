# PostgREST 配置文件示例
# 启动命令: postgrest postgrest.conf

db-uri = "postgres://postgres:postgres@localhost:5432/mydb"
db-schema = "public"
db-anon-role = "postgres"

# 服务器配置
server-port = 3000
server-host = "0.0.0.0"

# CORS 配置 - 允许浏览器扩展访问
# 注意：生产环境应该限制具体的扩展 ID
server-cors-allowed-origins = "*"

# JWT 配置（如果需要认证）
# jwt-secret = "your-jwt-secret"
# jwt-secret-is-base64 = false

# 日志配置
log-level = "info"
